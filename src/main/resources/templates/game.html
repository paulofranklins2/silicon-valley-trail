<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Silicon Valley Trail', 'game.css')}"></head>
<body>
<div class="container">

    <!-- Top bar: title, team, turn -->
    <div class="top-bar">
        <span class="top-bar__title">Silicon Valley Trail</span>
        <span class="top-bar__turn" th:text="'Turn ' + ${gameState.turn}">Turn 1</span>
    </div>

    <!-- Weather display -->
    <div class="weather-display" th:data-weather="${gameState.lastWeather}">
        <span class="weather-display__icon" id="weather-icon"></span>
        <span class="weather-display__label" id="weather-label"></span>
        <span class="weather-display__effects" id="weather-effects"></span>
    </div>

    <!-- Weather overlay (CSS animations + DOM particles) -->
    <div class="weather-overlay" id="weather-overlay">
        <div class="weather-particles" id="weather-particles"></div>
    </div>

    <!-- Journey progress visual -->
    <div class="journey-progress"
         th:data-current-index="${gameState.journeyState.currentLocationIndex}"
         th:data-distance-remaining="${gameState.journeyState.distanceToNextLocation}"
         th:data-locations="${gameState.journeyState.locations}"
         th:data-distances="${gameState.journeyState.distances}">
        <div class="journey-progress__cities">
            <span class="journey-progress__city journey-progress__city--current"
                  th:text="${gameState.journeyState.currentLocation.name}">San Jose</span>
            <span class="journey-progress__city journey-progress__city--dest">San Francisco</span>
        </div>
        <div class="journey-progress__track">
            <div class="journey-progress__rail"></div>
            <!-- City dots rendered by JS -->
            <div class="journey-progress__dots" id="journey-dots"></div>
            <div class="journey-progress__train" id="journey-train">
                <img src="/img/train.png" alt="Train" class="journey-progress__train-img">
            </div>
        </div>
        <div class="journey-progress__dist"
             th:text="'Next stop: ' + ${#numbers.formatDecimal(gameState.journeyState.distanceToNextLocation, 1, 1)} + ' km'">
            10 km
        </div>
    </div>

    <!-- Action scene stage (dynamically populated by animations.js) -->
    <div class="action-stage" id="action-stage">
        <div class="action-stage__scene" id="action-scene"></div>
    </div>

    <!-- Desktop two-column layout wrapper -->
    <div class="game-body">

        <!-- Left column: stats -->
        <div class="game-body__stats">
            <!-- Team display with status effects -->
            <div class="team-display">
                <span class="team-display__name" th:text="'Team: ' + ${gameState.teamName}">Team Name</span>
                <div class="team-display__members">
                    <div class="team-display__member" data-member="1">
                        <img src="/img/team-member-1.png" alt="Team member" class="team-display__sprite">
                    </div>
                    <div class="team-display__member" data-member="2">
                        <img src="/img/team-member-2.png" alt="Team member" class="team-display__sprite">
                    </div>
                    <div class="team-display__member" data-member="3">
                        <img src="/img/team-member-3.png" alt="Team member" class="team-display__sprite">
                    </div>
                    <div class="team-display__member" data-member="4">
                        <img src="/img/team-member-4.png" alt="Team member" class="team-display__sprite">
                    </div>
                </div>
            </div>

            <!-- Combined stats panel -->
            <div class="stats-panel">
                <div class="stats-panel__section">
                    <div class="stats-panel__section-label">Team Status</div>
                    <div class="stats-panel__bars">
                        <div class="stat-row" data-stat="health">
                            <span class="stat-row__label">HP</span>
                            <div class="stat-row__bar">
                                <div class="stat-row__fill"
                                     th:classappend="${gameState.teamState.health <= 25 ? 'danger' : (gameState.teamState.health <= 50 ? 'warning' : 'good')}"
                                     th:style="'width: ' + ${gameState.teamState.health} + '%'"></div>
                            </div>
                            <span class="stat-row__val" th:text="${gameState.teamState.health}">100</span>
                        </div>
                        <div class="stat-row" data-stat="energy">
                            <span class="stat-row__label">Energy</span>
                            <div class="stat-row__bar">
                                <div class="stat-row__fill"
                                     th:classappend="${gameState.teamState.energy <= 25 ? 'danger' : (gameState.teamState.energy <= 50 ? 'warning' : 'good')}"
                                     th:style="'width: ' + ${gameState.teamState.energy} + '%'"></div>
                            </div>
                            <span class="stat-row__val" th:text="${gameState.teamState.energy}">100</span>
                        </div>
                        <div class="stat-row" data-stat="morale">
                            <span class="stat-row__label">Morale</span>
                            <div class="stat-row__bar">
                                <div class="stat-row__fill"
                                     th:classappend="${gameState.teamState.morale <= 25 ? 'danger' : (gameState.teamState.morale <= 50 ? 'warning' : 'good')}"
                                     th:style="'width: ' + ${gameState.teamState.morale} + '%'"></div>
                            </div>
                            <span class="stat-row__val" th:text="${gameState.teamState.morale}">100</span>
                        </div>
                    </div>
                </div>
                <div class="stats-panel__divider"></div>
                <div class="stats-panel__section">
                    <div class="stats-panel__section-label">Resources</div>
                    <div class="stats-panel__resources">
                        <div class="res-item" data-res="cash">
                            <span class="res-item__icon">$</span>
                            <span class="res-item__name">Cash</span>
                            <div class="res-item__bar-wrap">
                                <div class="res-item__bar">
                                    <div class="res-item__fill res-item__fill--cash"></div>
                                </div>
                            </div>
                            <span class="res-item__val cash-val" th:text="${gameState.resourceState.cash}">100</span>
                            <span class="res-item__warn" id="cash-warn"></span>
                        </div>
                        <div class="res-item" data-res="food">
                            <img class="res-item__food-icon" src="/img/food-icon.png" alt="Food">
                            <span class="res-item__name">Food</span>
                            <div class="res-item__bar-wrap">
                                <div class="res-item__bar">
                                    <div class="res-item__fill res-item__fill--food"></div>
                                </div>
                            </div>
                            <span class="res-item__val food-val" th:text="${gameState.resourceState.food}">10</span>
                            <span class="res-item__warn" id="food-warn"></span>
                        </div>
                        <div class="res-item" data-res="compute">
                            <span class="res-item__icon res-item__icon--compute">C</span>
                            <span class="res-item__name">Compute</span>
                            <div class="res-item__bar-wrap">
                                <div class="res-item__bar">
                                    <div class="res-item__fill res-item__fill--compute"></div>
                                </div>
                            </div>
                            <span class="res-item__val compute-val" th:text="${gameState.resourceState.computeCredits}">5</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Event story beat (server-rendered for initial load) -->
            <div class="story-beat" th:if="${gameState.lastAction != null and !gameState.waitingEventChoice}">
                <div class="story-beat__action">
                    <span class="story-beat__action-label" th:text="${gameState.lastAction}">TRAVEL</span>
                </div>
                <div class="story-beat__event" th:if="${gameState.lastEvent != null}">
                    <p class="story-beat__title" th:text="${gameState.lastEvent.title}">Event Title</p>
                    <p class="story-beat__desc" th:text="${gameState.lastEvent.description}">Event description</p>
                    <div class="story-beat__impacts">
                        <span th:classappend="${gameState.lastEvent.healthChange > 0 ? 'positive' : 'negative'}"
                              th:if="${gameState.lastEvent.healthChange != 0}"
                              th:text="'Health ' + (${gameState.lastEvent.healthChange > 0} ? '+' : '') + ${gameState.lastEvent.healthChange}">Health</span>
                        <span th:classappend="${gameState.lastEvent.energyChange > 0 ? 'positive' : 'negative'}"
                              th:if="${gameState.lastEvent.energyChange != 0}"
                              th:text="'Energy ' + (${gameState.lastEvent.energyChange > 0} ? '+' : '') + ${gameState.lastEvent.energyChange}">Energy</span>
                        <span th:classappend="${gameState.lastEvent.moraleChange > 0 ? 'positive' : 'negative'}"
                              th:if="${gameState.lastEvent.moraleChange != 0}"
                              th:text="'Morale ' + (${gameState.lastEvent.moraleChange > 0} ? '+' : '') + ${gameState.lastEvent.moraleChange}">Morale</span>
                        <span th:classappend="${gameState.lastEvent.cashChange > 0 ? 'positive' : 'negative'}"
                              th:if="${gameState.lastEvent.cashChange != 0}"
                              th:text="'Cash ' + (${gameState.lastEvent.cashChange > 0} ? '+' : '') + ${gameState.lastEvent.cashChange}">Cash</span>
                        <span th:classappend="${gameState.lastEvent.foodChange > 0 ? 'positive' : 'negative'}"
                              th:if="${gameState.lastEvent.foodChange != 0}"
                              th:text="'Food ' + (${gameState.lastEvent.foodChange > 0} ? '+' : '') + ${gameState.lastEvent.foodChange}">Food</span>
                        <span th:classappend="${gameState.lastEvent.computeCreditsChange > 0 ? 'positive' : 'negative'}"
                              th:if="${gameState.lastEvent.computeCreditsChange != 0}"
                              th:text="'Compute ' + (${gameState.lastEvent.computeCreditsChange > 0} ? '+' : '') + ${gameState.lastEvent.computeCreditsChange}">Compute</span>
                    </div>
                </div>
            </div>

            <!-- Event choice fallback (no-JS form submission, hidden when JS takes over via modal) -->
            <noscript>
            <div class="event-choice" id="event-choice-container"
                 th:if="${gameState.waitingEventChoice and gameState.lastEvent != null}">
                <div class="event-choice__header">
                    <span class="event-choice__badge">CHOICE</span>
                    <p class="event-choice__title" th:text="${gameState.lastEvent.title}">Event Title</p>
                </div>
                <p class="event-choice__desc" th:text="${gameState.lastEvent.description}">A decision must be made...</p>
                <div class="event-choice__options">
                    <form th:each="outcome, iter : ${gameState.lastEvent.choices}"
                          action="/choice" method="post" style="display:contents">
                        <input type="hidden" name="choiceIndex" th:value="${iter.index}">
                        <button class="event-choice__btn" type="submit">
                            <span class="event-choice__btn-label" th:text="${outcome.description}">Option</span>
                            <span class="event-choice__btn-tags">
                                <span th:if="${outcome.healthChange != 0}"
                                      th:classappend="${outcome.healthChange > 0 ? 'tag--positive' : 'tag--negative'}"
                                      th:text="'Health ' + (${outcome.healthChange > 0} ? '+' : '') + ${outcome.healthChange}"
                                      class="event-choice__tag">Health</span>
                                <span th:if="${outcome.energyChange != 0}"
                                      th:classappend="${outcome.energyChange > 0 ? 'tag--positive' : 'tag--negative'}"
                                      th:text="'Energy ' + (${outcome.energyChange > 0} ? '+' : '') + ${outcome.energyChange}"
                                      class="event-choice__tag">Energy</span>
                                <span th:if="${outcome.moraleChange != 0}"
                                      th:classappend="${outcome.moraleChange > 0 ? 'tag--positive' : 'tag--negative'}"
                                      th:text="'Morale ' + (${outcome.moraleChange > 0} ? '+' : '') + ${outcome.moraleChange}"
                                      class="event-choice__tag">Morale</span>
                                <span th:if="${outcome.cashChange != 0}"
                                      th:classappend="${outcome.cashChange > 0 ? 'tag--positive' : 'tag--negative'}"
                                      th:text="'Cash ' + (${outcome.cashChange > 0} ? '+' : '') + ${outcome.cashChange}"
                                      class="event-choice__tag">Cash</span>
                                <span th:if="${outcome.foodChange != 0}"
                                      th:classappend="${outcome.foodChange > 0 ? 'tag--positive' : 'tag--negative'}"
                                      th:text="'Food ' + (${outcome.foodChange > 0} ? '+' : '') + ${outcome.foodChange}"
                                      class="event-choice__tag">Food</span>
                                <span th:if="${outcome.computeCreditsChange != 0}"
                                      th:classappend="${outcome.computeCreditsChange > 0 ? 'tag--positive' : 'tag--negative'}"
                                      th:text="'Compute ' + (${outcome.computeCreditsChange > 0} ? '+' : '') + ${outcome.computeCreditsChange}"
                                      class="event-choice__tag">Compute</span>
                            </span>
                        </button>
                    </form>
                </div>
            </div>
            </noscript>
        </div>

        <!-- Right column: actions -->
        <div class="game-body__actions">
            <div class="actions" th:classappend="${gameState.waitingEventChoice ? 'actions--choice-pending' : ''}">
                <div class="actions__grid">
                    <form th:each="info : ${actions}" action="/action" class="action-card" method="post">
                        <input name="action" type="hidden" th:value="${info.action}">
                        <button type="submit" th:data-energy-cost="${info.energyCost}">
                            <span class="action-card__name" th:text="${info.displayName}">Action</span>
                            <span class="action-card__fx">
                                <th:block th:each="fx, iter : ${info.effects}">
                                    <span th:if="${fx.random && !iter.first}" class="or-text">or</span>
                                    <span th:classappend="${fx.positive} ? 'gain' : 'cost'"
                                          th:text="${(fx.value > 0 ? '+' : '') + fx.value + ' ' + fx.stat.displayName}">effect</span>
                                </th:block>
                            </span>
                        </button>
                    </form>
                </div>
                <button class="market-btn" id="market-btn" type="button">Open City Market</button>
            </div>
        </div>

    </div>

</div>

<!-- Market modal overlay -->
<div id="market-modal" class="choice-modal" style="display:none">
    <div class="choice-modal__backdrop" id="market-backdrop"></div>
    <div class="choice-modal__content">
        <h3 class="choice-modal__title" id="market-modal-title"></h3>
        <p class="choice-modal__desc" id="market-modal-desc"></p>
        <div id="market-modal-stats"></div>
        <div class="choice-modal__options" id="market-modal-options"></div>
    </div>
</div>

<!-- Hidden data for JS (location names for journey map) -->
<script th:inline="javascript">
    window.__journeyData = {
        locations: /*[[${gameState.journeyState.locations}]]*/ [],
        distances: /*[[${gameState.journeyState.distances}]]*/ [],
        currentIndex: /*[[${gameState.journeyState.currentLocationIndex}]]*/ 0,
        distanceRemaining: /*[[${gameState.journeyState.distanceToNextLocation}]]*/ 0
    };
    window.__waitingEventChoice = /*[[${gameState.waitingEventChoice}]]*/ false;
    window.__lastEvent = /*[[${gameState.lastEvent}]]*/ null;
    window.__gameConfig = {
        foodGraceTurns: /*[[${foodGraceTurns}]]*/ 2,
        cashGraceTurns: /*[[${cashGraceTurns}]]*/ 3
    };
</script>

<!-- Choice modal overlay (JS-driven) -->
<div id="choice-modal" class="choice-modal" style="display:none">
    <div class="choice-modal__backdrop"></div>
    <div class="choice-modal__content">
        <h3 class="choice-modal__title" id="choice-modal-title"></h3>
        <p class="choice-modal__desc" id="choice-modal-desc"></p>
        <div class="choice-modal__options" id="choice-modal-options"></div>
    </div>
</div>

<!-- Toast container (positioned fixed, managed by JS) -->
<div th:replace="~{fragments/toast :: toast-container}"></div>

<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/stats.js}"></script>
<script th:src="@{/js/journey.js}"></script>
<script th:src="@{/js/animations.js}"></script>
<script th:src="@{/js/weather.js}"></script>
<script th:src="@{/js/actions.js}"></script>
</body>
</html>
