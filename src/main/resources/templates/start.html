<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Silicon Valley Trail', 'start.css')}"></head>
<body>
<div class="container start-page">
    <h1>Silicon Valley Trail</h1>
    <div class="pixel-border"></div>
    <p class="subtitle">From Garage to IPO</p>

    <!-- Team characters at starting line -->
    <div class="start-characters">
        <div class="start-characters__road">
            <div class="start-characters__line"></div>
            <div class="start-characters__group">
                <img class="start-characters__sprite start-characters__sprite--1" src="/img/team-member-1.png" alt="Team member">
                <img class="start-characters__sprite start-characters__sprite--2" src="/img/team-member-2.png" alt="Team member">
                <img class="start-characters__sprite start-characters__sprite--3" src="/img/team-member-3.png" alt="Team member">
                <img class="start-characters__sprite start-characters__sprite--4" src="/img/team-member-4.png" alt="Team member">
            </div>
            <div class="start-characters__dest">
                <img class="start-characters__train" src="/img/train.png" alt="Train">
                <span class="start-characters__dest-label">SF</span>
            </div>
        </div>
    </div>

    <p class="description">
        Name your startup team and begin the treacherous journey
        from San Jose to San Francisco. Will your team survive the
        grind, or burn out before Demo Day?
    </p>
    <form action="/start" class="start-form" method="post">
        <input name="teamName" placeholder="Enter team name..." required type="text">
        <div class="mode-selector">
            <label class="mode-option mode-option--active">
                <input type="radio" name="gameMode" value="FAST" checked>
                <span class="mode-option__name">Fast</span>
                <span class="mode-option__desc">Straight-line</span>
            </label>
            <label class="mode-option">
                <input type="radio" name="gameMode" value="ROAD">
                <span class="mode-option__name">Road</span>
                <span class="mode-option__desc">Driving distance</span>
            </label>
            <label class="mode-option" th:classappend="${!walkingAvailable} ? 'mode-option--disabled'">
                <input type="radio" name="gameMode" value="WALKING" th:disabled="${!walkingAvailable}">
                <span class="mode-option__name">Walking</span>
                <span class="mode-option__desc" th:text="${walkingAvailable} ? 'Impossible mode' : 'Requires API key'">Impossible mode</span>
            </label>
        </div>
        <button type="submit">Launch</button>
    </form>
    <script>
        document.querySelectorAll('.mode-option input').forEach(function(radio) {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.mode-option').forEach(function(el) {
                    el.classList.remove('mode-option--active');
                });
                this.closest('.mode-option').classList.add('mode-option--active');
            });
        });
    </script>
    <a href="/leaderboard" class="start-leaderboard-link">View Leaderboard</a>
</div>
</body>
</html>
