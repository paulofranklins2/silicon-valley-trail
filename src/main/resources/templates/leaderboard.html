<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Silicon Valley Trail - Leaderboard', 'end.css')}"></head>
<body>
<div class="container end-page">
    <h1 class="leaderboard-title">Leaderboard</h1>

    <div class="leaderboard-table-wrap" th:if="${!entries.isEmpty()}">
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Team</th>
                    <th>Result</th>
                    <th>Turns</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry, iter : ${entries}"
                    th:classappend="${entry.victory} ? 'leaderboard-row--victory' : 'leaderboard-row--defeat'">
                    <td th:text="${iter.index + 1}">1</td>
                    <td th:text="${entry.playerName}">Player</td>
                    <td th:text="${entry.teamName}">Team</td>
                    <td>
                        <span th:if="${entry.victory}" class="badge badge--victory">WIN</span>
                        <span th:unless="${entry.victory}" class="badge badge--defeat">LOST</span>
                    </td>
                    <td th:text="${entry.turns}">0</td>
                    <td th:text="${entry.score}">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${entries.isEmpty()}" class="leaderboard-empty">No scores yet. Be the first!</p>

    <div class="end-actions">
        <a href="/">Play Again</a>
    </div>
</div>
</body>
</html>
