<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Silicon Valley Trail - Leaderboard', 'end.css')}"></head>
<body>
<div class="container end-page">
    <h1 class="leaderboard-title">Leaderboard</h1>

    <div class="leaderboard-grid">
        <div class="leaderboard-section" th:each="entry : ${leaderboard}">
            <h2 class="leaderboard-section__title" th:text="${entry.key.displayName}">Mode</h2>
            <p class="leaderboard-section__desc" th:text="${entry.key.description}">Description</p>
            <div class="leaderboard-table-wrap" th:if="${!entry.value.isEmpty()}">
                <table class="leaderboard-table">
                    <thead><tr><th>#</th><th>Player</th><th>Result</th><th>Score</th></tr></thead>
                    <tbody>
                    <tr th:each="score, iter : ${entry.value}"
                        th:classappend="${score.victory} ? 'leaderboard-row--victory' : 'leaderboard-row--defeat'">
                        <td th:text="${iter.index + 1}">1</td>
                        <td th:text="${score.playerName}">Player</td>
                        <td>
                            <span th:if="${score.victory}" class="badge badge--victory">WIN</span>
                            <span th:unless="${score.victory}" class="badge badge--defeat">LOST</span>
                        </td>
                        <td th:text="${score.score}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <p class="leaderboard-empty" th:if="${entry.value.isEmpty()}">No scores yet</p>
        </div>
    </div>

    <div class="end-actions">
        <a href="/">Play Again</a>
    </div>
</div>
</body>
</html>
