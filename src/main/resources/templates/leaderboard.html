<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Silicon Valley Trail - Leaderboard', 'end.css')}"></head>
<body>
<div class="container end-page leaderboard-page">
    <section class="leaderboard-hero">
        <div class="leaderboard-hero__copy">
            <h1 class="leaderboard-title" th:text="${leaderboardTitle}">All-Time</h1>
        </div>
    </section>

    <div class="leaderboard-tabs">
        <a href="/leaderboard"
           class="leaderboard-tab"
           th:classappend="${view == 'overall'} ? 'leaderboard-tab--active'">All-Time</a>
        <a href="/leaderboard/daily"
           class="leaderboard-tab"
           th:classappend="${view == 'daily'} ? 'leaderboard-tab--active'">Today</a>
    </div>

    <section class="leaderboard-board">
        <div class="leaderboard-board__header">
            <div>
                <p class="leaderboard-board__eyebrow" th:text="${view == 'daily' ? 'Daily board' : 'All-time board'}">All-time board</p>
                <h2 class="leaderboard-board__title">Top 10</h2>
            </div>
        </div>

        <div class="leaderboard-table-wrap">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Mode</th>
                        <th>Outcome</th>
                        <th>Location</th>
                        <th>Turns</th>
                        <th>Time</th>
                        <th>Raw</th>
                        <th>Mult</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:each="score, iter : ${leaderboard}"
                    th:classappend="${score.victory} ? 'leaderboard-row--victory' : 'leaderboard-row--defeat'">
                    <td th:text="${iter.index + 1}">1</td>
                    <td th:text="${score.playerName}">Player</td>
                    <td>
                        <span class="leaderboard-mode"
                              th:classappend="'leaderboard-mode--' + ${#strings.toLowerCase(score.gameMode.name())}"
                              th:text="${score.gameMode.displayName}">Easy</span>
                    </td>
                    <td>
                        <span th:if="${score.victory}" class="leaderboard-outcome">Won</span>
                        <span th:unless="${score.victory}"
                              class="leaderboard-outcome"
                              th:text="${score.lossReason != null ? score.lossReason.displayName : 'Lost'}">Lost</span>
                    </td>
                    <td th:text="${score.lastLocation}">City</td>
                    <td th:text="${score.turns}">0</td>
                    <td th:text="${score.formattedTime}">-</td>
                    <td class="leaderboard-score-raw" th:text="${score.score}">0</td>
                    <td class="leaderboard-score-mult"
                        th:text="'×' + ${#numbers.formatDecimal(score.gameMode.scoreMultiplier, 1, 1)}">×1.0</td>
                    <td class="leaderboard-score-weighted" th:text="${score.weightedScore}">0</td>
                </tr>
                <!-- Filler rows so the table always has 10 slots. Prevents layout
                     shift when the first real score is added. -->
                <tr th:each="i : ${#numbers.sequence(1, 10 - leaderboard.size())}"
                    th:if="${leaderboard.size() < 10}"
                    class="leaderboard-row--empty">
                    <td th:text="${leaderboard.size() + i}">—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <div class="end-actions">
        <a href="/">Play Again</a>
    </div>
</div>
</body>
</html>
