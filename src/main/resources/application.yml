spring:
  application:
    name: silicon-valley-trail

  datasource:
    url: ${DB_URL:jdbc:h2:mem:svt}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

game:
  weather:
    # options: api == real weather, mock == random, demo == cycles through all types sequentially
    mode: api
