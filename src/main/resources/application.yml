spring:
  application:
    name: silicon-valley-trail

  datasource:
    url: jdbc:h2:mem:svt
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

game:
  weather:
    # options: api == real weather, mock == random, demo == cycles through all types sequentially
    mode: api